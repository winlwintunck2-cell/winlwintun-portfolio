<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About | Win Lwin Tun</title>

<style>

/* ================= LOADING ================= */
#loading{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f172a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:9999;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid #333;
    border-top:5px solid #38bdf8;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* ================= MAIN ================= */
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    text-align:center;
    padding:20px;
}

/* TITLE */
h1{
    color:#38bdf8;
    margin-top:80px;
    font-size:2rem;
    text-shadow:0 0 10px rgba(56,189,248,0.3);
}

/* GALLERY */
.gallery{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

.gallery img{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:12px;
    border:2px solid #38bdf8;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

nav a{
    color:#38bdf8;
    text-decoration:none;
    margin:10px;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
</div>

<!-- NAV -->
<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
</nav>

<!-- TITLE -->
<h1>ချောင်းကန်ကျေးရွာ၏ပုံများ</h1>

<!-- GALLERY -->
<div class="gallery">
    <img src="photo1.jpg" alt="">
    <img src="photo2.jpg" alt="">
    <img src="photo3.jpg" alt="">
    <img src="photo4.jpg" alt="">
</div>

<script>

/* LOADING REMOVE */
window.addEventListener("load",()=>{
    setTimeout(()=>{
        document.getElementById("loading").style.display="none";
    },600);
});

</script>

</body>
</html>
