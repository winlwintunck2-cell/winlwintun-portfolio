<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About | Win Lwin Tun</title>

<style>

/* ================= STARS BACKGROUND ================= */
#stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    background:#0f172a;
}

/* ================= LOADING ================= */
#loading{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f172a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:9999;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid #333;
    border-top:5px solid #38bdf8;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* ================= MAIN ================= */
body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    padding:20px;
}

/* NAV */
nav a{
    color:#38bdf8;
    text-decoration:none;
    margin:10px;
    font-weight:bold;
}

/* TITLE */
h1{
    color:#38bdf8;
    margin-top:60px;
}

/* TEXT */
p{
    max-width:800px;
    margin:20px auto;
    line-height:1.8;
}

/* GALLERY */
.gallery{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-top:30px;
}

.gallery img{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:12px;
    border:2px solid #38bdf8;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.1);
}

/* VOICE BUTTON */
#voiceBtn{
    position:fixed;
    bottom:20px;
    left:20px;
    padding:12px 15px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
    z-index:99999;
}

/* LIGHTBOX */
#lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

#lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
    border:2px solid #38bdf8;
}

/* SMOOTH */
html{
    scroll-behavior:smooth;
}

</style>
</head>

<body>

<!-- 🌌 STARS -->
<canvas id="stars"></canvas>

<!-- 🔵 LOADING -->
<div id="loading">
    <div class="spinner"></div>
    <p>Loading Story...</p>
</div>

<!-- 🔊စာမဖက်ပဲအသံဖြင့်ရွာအကြောင်းနားဆင်ရန် VOICE BUTTON -->
<button id="voiceBtn" onclick="readStory()">🔊 Read</button>

<!-- NAV -->
<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
</nav>

<!-- TITLE -->
<h1>ချောင်းကန်ရွာ၏အကြောင်း</h1>

<!-- TEXT -->
<p>
ဤသာယာသောရွာလေးတွင် ကျောင်းကြီး ရွှေကျောင်းဟာသော ဘုန်းတော်ကြီးနှစ်ကျောင်းတည်ရှိလေသည်။
</p>

<!-- GALLERY -->
<div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImg()">
    <img id="lightboxImg">
</div>

<script>

/* ================= LOADING ================= */
window.addEventListener("load",()=>{
    setTimeout(()=>{
        document.getElementById("loading").style.display="none";
    },600);
});

/* ================= STARS ================= */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        speed:Math.random()*0.5+0.2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    for(let s of stars){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();

        s.y += s.speed;

        if(s.y > canvas.height){
            s.y = 0;
            s.x = Math.random()*canvas.width;
        }
    }

    requestAnimationFrame(draw);
}

draw();

/* ================= AUTO VOICE ================= */
window.addEventListener("load",()=>{
    setTimeout(()=>{
        let text = "ချောင်းကန်ရွာ၏အကြောင်း။ ဤသာယာသောရွာလေးတွင် ကျောင်းကြီး ရွှေကျောင်းဟူသော ဘုန်းတော်ကြီးနှစ်ကျောင်းတည်ရှိလေသည်။";

        let speech = new SpeechSynthesisUtterance(text);
        speech.rate = 0.9;
        speech.pitch = 1;

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(speech);
    },1500);
});

/* ================= MANUAL VOICE ================= */
function readStory(){
    let text = "ချောင်းကန်ရွာ၏အကြောင်း။ ဤသာယာသောရွာလေးတွင် ကျောင်းကြီး ရွှေကျောင်းဟာသော ဘုန်းတော်ကြီးနှစ်ကျောင်းတည်ရှိလေသည်။";

    let speech = new SpeechSynthesisUtterance(text);
    speech.rate = 0.9;
    speech.pitch = 1;

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
}

/* ================= IMAGE ZOOM ================= */
let imgs = document.querySelectorAll(".gallery img");

imgs.forEach(img=>{
    img.addEventListener("click",()=>{
        document.getElementById("lightbox").style.display="flex";
        document.getElementById("lightboxImg").src = img.src;
    });
});

function closeImg(){
    document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
